name: Deploy Suno Style Creator to GitHub Pages

on:
  push:
    branches:
      - main # Or change to 'master' if your default branch uses that name

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Change to 'build' if you are using Create React App instead of Vite
          branch: gh-pages # The branch the action will deploy to